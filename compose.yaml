# Docker Compose file for PostgreSQL with persistent volume
version: '3.8'
services:
  pickleball-db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pickleball
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pickleball-redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
